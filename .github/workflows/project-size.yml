name: Project size (weekly)

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: CONVEX_AGENT_MODE=anonymous npx convex dev --once

      - run: npm run build && npm run metrics

      - name: Check budgets
        run: npm run size:check

      - uses: actions/upload-artifact@v4
        with:
          name: weekly-metrics-${{ github.run_number }}
          path: .metrics/
          retention-days: 90
