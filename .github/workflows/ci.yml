name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: CONVEX_AGENT_MODE=anonymous npx convex dev --once

      - run: npm run typecheck

      - run: npm run build

      - run: npm test
