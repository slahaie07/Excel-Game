<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Excel Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; padding: 2em; background: #f5f5f5; }
    h1 { color: #2675A6; }
    .game-box { background: #fff; padding: 2em; border-radius: 10px; box-shadow: 0 2px 8px #0001; max-width: 600px; margin: auto; }
    button { font-size: 1.1em; margin: 1em 0; }
  </style>
</head>
<body>
  <div class="game-box">
    <h1>Bienvenue sur le Excel Game !</h1>
    <p>Pour jouer, personnalisez ce fichier avec votre propre contenu.</p>
    <p>Ce fichier <strong>index.html</strong> s'affichera dans votre navigateur dès que vous l'ouvrirez.</p>
    <button onclick="alert('Bravo, le jeu fonctionne !')">Testez le bouton</button>
    <hr style="margin: 2em 0;">
    <h2 style="color: #667eea;">Ma Bibliothèque</h2>
    <p>Gérez vos fichiers, photos, audio et notes. Chaque élément devient un livre dans votre bibliothèque!</p>
    <button onclick="window.location.href='library.html'" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 15px 30px; border-radius: 25px; cursor: pointer;">
      Ouvrir ma bibliothèque
    </button>
  </div>
</body>
</html>
